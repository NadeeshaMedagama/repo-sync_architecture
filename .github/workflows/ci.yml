# ──────────────────────────────────────────────────
# CI Pipeline — Lint, Validate & Test
# ──────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  # ────────────── HTML Validation ──────────────
  validate:
    name: 🔍 Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install html-validate
        run: npm install -g html-validate

      - name: 🔍 Validate HTML structure
        run: |
          echo "Validating architecture_diagram.html..."
          # Check file exists and is not empty
          test -s architecture_diagram.html || (echo "❌ File is missing or empty" && exit 1)
          echo "✅ HTML file exists and is not empty"

      - name: 📏 Check file size
        run: |
          FILE_SIZE=$(stat -c%s architecture_diagram.html)
          echo "📄 File size: $FILE_SIZE bytes"
          if [ "$FILE_SIZE" -lt 100 ]; then
            echo "❌ File seems too small"
            exit 1
          fi
          echo "✅ File size check passed"

  # ────────────── Docker Build Test ──────────────
  docker-test:
    name: 🐳 Docker Build Test
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image (test)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: reposync-architecture:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🧪 Test container starts
        run: |
          docker run -d --name test-container -p 8080:80 reposync-architecture:test
          sleep 5

      - name: 🔍 Test health endpoint
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/health || true)
          curl -s http://localhost:8080/health | jq . || true
          echo "Health check status: $HTTP_STATUS"

      - name: 🌐 Test main page
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          echo "Main page HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ Main page returned $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Main page is accessible"

      - name: 📝 Test page content
        run: |
          CONTENT=$(curl -s http://localhost:8080/)
          if echo "$CONTENT" | grep -q "RepoSync"; then
            echo "✅ Page contains expected content"
          else
            echo "❌ Page does not contain expected content"
            exit 1
          fi

      - name: 🧹 Cleanup
        if: always()
        run: |
          docker stop test-container || true
          docker rm test-container || true
