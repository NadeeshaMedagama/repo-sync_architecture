# ──────────────────────────────────────────────────
# Docker Build, Test & Push to Docker Hub
# ──────────────────────────────────────────────────
name: Docker Build, Test & Push

on:
  push:
    branches: [master]
    tags: ['v*.*.*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DOCKERHUB_REPO: nadeeshamedagama/reposync-architecture
  # Force lowercase for OCI registry compatibility
  GHCR_REPO: ghcr.io/nadeeshamedagama/reposync-architecture

jobs:
  # ────────────── Build & Test ──────────────
  build-and-test:
    name: 🐳 Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: reposync-architecture:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🧪 Run container tests
        run: |
          # Start container
          docker run -d --name test-app -p 8080:80 reposync-architecture:test
          sleep 5

          # Test health endpoint
          echo "Testing health endpoint..."
          curl -sf http://localhost:8080/health | jq .
          echo "✅ Health check passed"

          # Test main page
          echo "Testing main page..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Main page returns 200"
          else
            echo "❌ Main page returns $HTTP_CODE"
            exit 1
          fi

          # Test content
          echo "Testing page content..."
          curl -s http://localhost:8080/ | grep -q "RepoSync" && echo "✅ Content verified" || (echo "❌ Content check failed" && exit 1)

      - name: 🧹 Cleanup test container
        if: always()
        run: |
          docker stop test-app || true
          docker rm test-app || true

  # ────────────── Push to Docker Hub ──────────────
  push-dockerhub:
    name: 📦 Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🐳 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: ✅ Verify Docker Hub credentials
        run: |
          echo "Verifying Docker Hub login..."
          docker info | grep -i username || true
          # Verify the repository is accessible
          TOKEN=$(curl -s -H "Content-Type: application/json" \
            -X POST -d '{"username":"${{ secrets.DOCKERHUB_USERNAME }}","password":"${{ secrets.DOCKERHUB_TOKEN }}"}' \
            https://hub.docker.com/v2/users/login/ | jq -r .token)
          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "❌ Docker Hub authentication failed. Please verify DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets."
            exit 1
          fi
          echo "✅ Docker Hub authentication verified"

      - name: 📋 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REPO }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🚀 Build & Push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📝 Docker Hub Description
        if: github.ref == 'refs/heads/master'
        uses: peter-evans/dockerhub-description@v4
        continue-on-error: true
        id: dockerhub-desc
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          # ⚠️ Requires a Docker Hub PAT with 'Read, Write, and Delete' scope.
          # 'Read & Write' alone is NOT enough — the Docker Hub description
          # API requires the 'Delete' scope even for PATCH operations.
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_REPO }}
          short-description: "RepoSync Architecture Diagram — Interactive system architecture visualization"
          readme-filepath: ./README.md

      - name: ⚠️ Docker Hub Description update status
        if: steps.dockerhub-desc.outcome == 'failure'
        run: |
          echo "::warning::Docker Hub description update failed. This is non-critical."
          echo "To fix: Regenerate your Docker Hub PAT (DOCKERHUB_TOKEN) with 'Read, Write, and Delete' scope."
          echo "'Read & Write' scope alone is NOT sufficient — the description API requires 'Delete' scope."

